<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>TRUNEY - 貴金屬交易中心</title>
    <style>
        /* 기본 스타일 */
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #1a1a1a; color: #fff; }
        
        /* 헤더 섹션 */
        header { background-color: #000; padding: 20px 0; border-bottom: 2px solid #b8860b; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; color: #b8860b; margin-bottom: 15px; }
        .search-container { display: flex; justify-content: center; gap: 10px; }
        .search-container input { padding: 10px; width: 300px; border: 1px solid #444; background: #333; color: white; }
        .search-container button { padding: 10px 20px; background: #b8860b; border: none; color: white; cursor: pointer; font-weight: bold; }

        /* 메뉴 섹션 */
        nav { background: #111; padding: 15px 0; border-bottom: 1px solid #333; }
        nav ul { display: flex; list-style: none; justify-content: center; gap: 40px; margin: 0; padding: 0; }
        nav li { font-size: 16px; cursor: pointer; color: #ddd; transition: 0.3s; }
        nav li:hover { color: #b8860b; }
        .hot { background: #d32f2f; font-size: 10px; padding: 2px 6px; border-radius: 4px; vertical-align: top; }

        /* 히어로 섹션 (원본과 유사한 어두운 느낌) */
        .hero { height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), #222; text-align: center; }
        .hero h1 { font-size: 50px; color: #b8860b; margin-bottom: 20px; letter-spacing: 2px; }
        .hero p { font-size: 20px; color: #ccc; max-width: 600px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">TRUNEY 黃金白銀交易中心</div>
        <div class="search-container">
            <input type="text" placeholder="Search Products...">
            <button>Search</button>
        </div>
    </header>
    <nav>
        <ul>
            <li>Lunar Horse <span class="hot">HOT</span></li>
            <li>Gold</li>
            <li>Silver</li>
            <li>Collection</li>
            <li>Online Appointment</li>
        </ul>
    </nav>
    <main class="hero">
        <h1>【動盪中的定力】</h1>
        <p>TRUNEY 鄭重聲明：以契約精神，捍衛您的每一分託付。</p>
    </main>
</body>
</html>
